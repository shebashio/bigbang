# enables and configures gatekeeper to add an exception for the allowedDockerRegistries violations in the istio-system namespace (when using k3d)
# this is required for development deployments to allow the istio loadbalancer daemonset to come up with rancher images rather than images from registry1.dso.mil or registry.dso.mil

gatekeeper:
  values:
    violations:
      allowedCapabilities:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to not drop capabilities
          - istio-system/lb-port-.*
      allowedDockerRegistries:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to pull from public repos
          - istio-system/lb-port-.*
      allowedSecCompProfiles:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to have an undefined defined seccomp
          - istio-system/lb-port-.*
      allowedUsers:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to run as any user/group
          - istio-system/lb-port-.*
      containerRatio:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to have undefined limits/requests
          - istio-system/lb-port-.*
      hostNetworking:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to mount host ports
          - istio-system/lb-port-.*
      noBigContainers:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to have undefined limits/requests
          - istio-system/lb-port-.*
      noPrivilegedEscalation:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to have undefined security context
          - istio-system/lb-port-.*
      readOnlyRoot:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to mount filesystems read/write
          - istio-system/lb-port-.*
      requiredLabels:
        parameters:
          excludedResources:
          # Allows k3d load balancer pods to not have required labels
          - istio-system/svclb-.*
      requiredProbes:
        parameters:
          excludedResources:
          # Allows k3d load balancer containers to not have readiness/liveness probes
          - istio-system/lb-port-.*

kyvernoPolicies:
  values:
    additionalPolicyExceptions:
      k3d-svclb:
        apiVersion: policies.kyverno.io/v1
        spec:
          policyRefs:
            - name: disallow-privileged-containers-cel
              kind: ValidatingPolicy
            - name: disallow-privilege-escalation-cel
              kind: ValidatingPolicy
            - name: restrict-capabilities-cel
              kind: ValidatingPolicy
            - name: require-drop-all-capabilities-cel
              kind: ValidatingPolicy
            - name: restrict-host-ports-cel
              kind: ValidatingPolicy
            - name: disallow-host-namespaces-cel
              kind: ValidatingPolicy
            - name: require-non-root-user-cel
              kind: ValidatingPolicy
            - name: require-non-root-group-cel
              kind: ValidatingPolicy
            - name: restrict-seccomp-cel
              kind: ValidatingPolicy
            - name: restrict-image-registries-cel
              kind: ValidatingPolicy
            - name: disallow-image-tags-cel
              kind: ValidatingPolicy
            - name: require-labels-cel
              kind: ValidatingPolicy
            - name: add-default-capability-drop-cel
              kind: MutatingPolicy
            - name: add-default-securitycontext-cel
              kind: MutatingPolicy
          matchConditions:
            - name: k3d-svclb
              expression: >-
                (object.metadata.namespace == 'istio-system' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('svclb-'))
    celPoliciesBeta:
      restrict-host-path-mount-pv-cel:
        parameters:
          allow:
            - /var/lib/rancher/k3s/storage/pvc-*
