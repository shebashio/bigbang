openshift: true
gatekeeper:
  values:
    violations:
      selinuxPolicy:
        enforcementAction: dryrun
        parameters:
          excludedResources:
          # Allow kyverno pods
          - kyverno/kyverno-.*
          - istio-system/istiod-.*
          - istio-gateway/public-ingressgateway-.*
          - istio-gateway/passthrough-ingressgateway-.*
          - eck-operator/elastic-operator-.*
          - minio-operator/minio-operator-.*
          - minio-operator/console-.*
          - fortify/fortify-mysql-.*
          - fortify/fortify-ssc-webapp-.*
          - gitlab/webservice-test-runner-.*
          - gitlab/gitlab-minio-.*
          - gitlab-runner/runner-.*
          - twistlock/twistlock-defender-.*
          - neuvector/neuvector-.*
          - argocd/guestbook-ui-.*
          - keycloak/keycloak-.*
          - velero/velero-backup-restore-test.*
          - vault/vault-vault.*
          - monitoring/monitoring-monitoring-kube-admission-create-.*
monitoring:
  values:
    prometheus:
      prometheusSpec:
        additionalScrapeConfigs: []
        podMetadata:
          annotations:
            vault.hashicorp.com/agent-inject: "false"
            vault.hashicorp.com/agent-init-first: "true"
            vault.hashicorp.com/agent-inject-token: "true"
            vault.hashicorp.com/role: "prometheus"
            vault.hashicorp.com/agent-pre-populate: "false"
        resources:
          requests:
            cpu: 300m
            memory: 5Gi
          limits: null
    grafana:
      downloadDashboards:
        resources:
          limits: null
          requests:
            cpu: 20m
            memory: 20Mi
neuvector:
  values:
    k3s:
      enabled: false
    crio:
      enabled: true
      path: /var/run/crio/crio.sock
    istio:
      enabled: true
      hardened:
        enabled: false
        tempo:
          enabled: false
      console:
        enabled: false
    openshift: true
    bbtests:
      cypress:
        openshift: true
kyvernoPolicies:
  values:
    additionalPolicyExceptions:
      openshift-disallow-privileged-containers:
        spec:
          policyRefs:
            - name: disallow-privileged-containers
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-'))
      openshift-disallow-privilege-escalation:
        spec:
          policyRefs:
            - name: disallow-privilege-escalation
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'anchore' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('anchore-enterprise-migrate-db')) ||
                (object.metadata.namespace == 'authservice' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('authservice-authservice-redis-bb-master-')) ||
                (object.metadata.namespace == 'sonarqube' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('sonarqube-postgresql-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('sonarqube-sonarqube-')
                ))
      openshift-restrict-image-registries:
        spec:
          policyRefs:
            - name: restrict-image-registries
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'argocd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('guestbook-ui-')) ||
                (object.metadata.namespace == 'openshift-marketplace' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('certified-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('community-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('redhat-')
                )) ||
                (object.metadata.namespace == 'openshift-operator-lifecycle-manager' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('collect-profiles-')) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-')) ||
                (object.metadata.namespace == 'openshift-monitoring' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('prometheus-k8s-'))
      openshift-require-non-root-group:
        spec:
          policyRefs:
            - name: require-non-root-group
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'authservice' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('authservice-authservice-redis-bb-master-')) ||
                (object.metadata.namespace == 'gitlab' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('gitlab-minio-')) ||
                (object.metadata.namespace == 'fortify' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('fortify-mysql-')) ||
                (object.metadata.namespace == 'metallb-system' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('speaker-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('controller-')
                )) ||
                (object.metadata.namespace == 'harbor' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('harbor-redis-bb-')) ||
                (object.metadata.namespace == 'argocd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('argocd-argocd-redis-')) ||
                (object.metadata.namespace == 'velero' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('velero-backup-restore-test')) ||
                (object.metadata.namespace == 'openshift-operator-lifecycle-manager' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('collect-profiles-')) ||
                (object.metadata.namespace == 'openshift-marketplace' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('certified-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('community-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('redhat-')
                )) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-')) ||
                (object.metadata.namespace == 'istio-system' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('passthrough-ingressgateway-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('public-ingressgateway-')
                )) ||
                (object.metadata.namespace == 'openshift-monitoring' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('prometheus-k8s-'))
      openshift-require-non-root-user:
        spec:
          policyRefs:
            - name: require-non-root-user
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'authservice' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('authservice-authservice-redis-bb-master-')) ||
                (object.metadata.namespace == 'gitlab' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('gitlab-minio-')) ||
                (object.metadata.namespace == 'metallb-system' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('speaker-')) ||
                (object.metadata.namespace == 'argocd' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('guestbook') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('argocd-argocd-redis-')
                )) ||
                (object.metadata.namespace == 'harbor' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('harbor-redis-bb-')) ||
                (object.metadata.namespace == 'velero' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('velero-backup-restore-test')) ||
                (object.metadata.namespace == 'twistlock' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('volume-upgrade-job')) ||
                (object.metadata.namespace == 'openshift-operator-lifecycle-manager' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('collect-profiles-')) ||
                (object.metadata.namespace == 'openshift-marketplace' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('certified-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('community-operators-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('redhat-')
                )) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-')) ||
                (object.metadata.namespace == 'istio-system' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('passthrough-ingressgateway-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('public-ingressgateway-')
                )) ||
                (object.metadata.namespace == 'openshift-monitoring' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('prometheus-k8s-'))
      openshift-require-drop-all-capabilities:
        spec:
          policyRefs:
            - name: require-drop-all-capabilities
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                (object.metadata.namespace == 'gitlab' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('gitlab-minio-')) ||
                (object.metadata.namespace == 'twistlock' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('twistlock-defender-ds')) ||
                (object.metadata.namespace == 'neuvector' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('neuvector-enforcer-pod') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('neuvector-controller-pod') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('neuvector-prometheus-exporter-pod')
                )) ||
                (object.metadata.namespace == 'argocd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('guestbook-ui-')) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-')) ||
                (object.metadata.namespace == 'openshift-monitoring' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('prometheus-k8s-'))
      openshift-restrict-volume-types:
        spec:
          policyRefs:
            - name: restrict-volume-types
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                ((object.metadata.namespace in ['gitlab', 'gitlab-runner', 'kiali', 'cluster-auditor', 'mattermost', 'keycloak', 'kyverno-reporter', 'monitoring', 'vault', 'logging', 'twistlock', 'sonarqube', 'tempo', 'argocd', 'minio', 'minio-operator', 'neuvector', 'harbor', 'fortify', 'thanos']) && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).contains('-cypress-test')) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-'))
      openshift-restrict-host-path-mount:
        spec:
          policyRefs:
            - name: restrict-host-path-mount
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                ((object.metadata.namespace in ['gitlab', 'gitlab-runner', 'kiali', 'cluster-auditor', 'mattermost', 'keycloak', 'kyverno-reporter', 'monitoring', 'vault', 'logging', 'twistlock', 'sonarqube', 'tempo', 'argocd', 'minio', 'minio-operator', 'neuvector', 'harbor', 'fortify', 'thanos']) && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).contains('-cypress-test')) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-'))
      openshift-restrict-host-path-write:
        spec:
          policyRefs:
            - name: restrict-host-path-write
              kind: ValidatingPolicy
          matchConditions:
            - name: openshift-workloads
              expression: >-
                ((object.metadata.namespace in ['gitlab', 'gitlab-runner', 'kiali', 'cluster-auditor', 'mattermost', 'keycloak', 'kyverno-reporter', 'monitoring', 'vault', 'logging', 'twistlock', 'sonarqube', 'tempo', 'argocd', 'minio', 'minio-operator', 'neuvector', 'harbor', 'fortify', 'thanos']) && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).contains('-cypress-test')) ||
                (object.metadata.namespace == 'neuvector' && (
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('neuvector-enforcer-') ||
                  object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('neuvector-manager-')
                )) ||
                (object.metadata.namespace == 'openshift-etcd' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('installer-'))
# Addons are toggled based on labels in CI
addons:
  minioOperator:
    values:
      openshift: true
  minio:
    values:
      annotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: "443"
      istio: 
        enabled: true
      openshift: true