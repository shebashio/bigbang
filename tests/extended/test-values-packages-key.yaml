# Validate Big Bang's generic `packages` integration with a maintained package
# that is intentionally not part of the umbrella chart.
packages:
  podinfo:
    enabled: true
    namespace:
      name: podinfo
    helmRelease:
      namespace: bigbang
    sourceType: git
    git:
      repo: https://repo1.dso.mil/big-bang/product/maintained/podinfo.git
      path: chart
      tag: 6.14.0-bb.1
    bbCommonValues: true
    values:
      bb-common:
        istio:
          serviceEntries:
            custom:
              - name: repo1
                spec:
                  hosts:
                    - repo1.dso.mil
                    - cdn.jsdelivr.net
                  location: MESH_EXTERNAL
                  ports:
                    - number: 443
                      protocol: TLS
                      name: https
                  resolution: DNS
      bbtests:
        enabled: true

kyvernoPolicies:
  values:
    # podinfo is a demo app that violates several policies (host path mounts, tagged
    # images pulled from a public registry, etc.), so it is exempted from them.
    additionalPolicyExceptions:
      podinfo:
        metadata:
          annotations:
            policies.kyverno.io/title: Podinfo Test Exception
            policies.kyverno.io/category: Test
            policies.kyverno.io/subject: Pod
            policies.kyverno.io/description: >-
              Allows resources created by the Podinfo packages-key validation test.
        spec:
          policyRefs:
            - name: restrict-host-path-mount
              kind: ValidatingPolicy
            - name: restrict-host-path-write
              kind: ValidatingPolicy
            - name: restrict-volume-types
              kind: ValidatingPolicy
            - name: require-non-root-group
              kind: ValidatingPolicy
            - name: require-non-root-user
              kind: ValidatingPolicy
            - name: disallow-image-tags
              kind: ValidatingPolicy
            - name: require-drop-all-capabilities
              kind: ValidatingPolicy
            - name: restrict-image-registries
              kind: ValidatingPolicy
          matchConditions:
            - name: podinfo
              expression: >-
                (object.metadata.namespace == 'podinfo' && object.metadata.?name.orValue(object.metadata.?generateName.orValue('')).startsWith('podinfo'))
