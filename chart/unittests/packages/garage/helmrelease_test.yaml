# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Garage - HelmRelease Tests
templates:
  - templates/garage/helmrelease.yaml
tests:
  - it: should render a HelmRelease pointing at the Garage GitRepository
    set:
      addons:
        garage:
          enabled: true
    asserts:
      - isKind:
          of: HelmRelease
      - equal:
          path: metadata.name
          value: garage
      - equal:
          path: spec.chart.spec.sourceRef.kind
          value: GitRepository
      - equal:
          path: spec.chart.spec.sourceRef.name
          value: garage
      - equal:
          path: spec.chart.spec.chart
          value: ./chart
