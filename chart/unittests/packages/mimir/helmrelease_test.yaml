# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Mimir - HelmRelease
tests:
- it: should fail when minio-tenant is enabled but minioOperator is disabled
  set:
    addons:
      mimir:
        enabled: true
        values:
          minio-tenant:
            enabled: true
      minioOperator:
        enabled: false
  template: mimir/helmrelease.yaml
  asserts:
  - failedTemplate:
      errorMessage: "mimir with minio-tenant.enabled=true requires addons.minioOperator.enabled to be true"

- it: should succeed when minio-tenant is enabled and minioOperator is enabled
  set:
    addons:
      mimir:
        enabled: true
        values:
          minio-tenant:
            enabled: true
      minioOperator:
        enabled: true
  template: mimir/helmrelease.yaml
  asserts:
  - isKind:
      of: HelmRelease

- it: should succeed when minio-tenant is disabled
  set:
    addons:
      mimir:
        enabled: true
        values:
          minio-tenant:
            enabled: false
      minioOperator:
        enabled: false
  template: mimir/helmrelease.yaml
  asserts:
  - isKind:
      of: HelmRelease

- it: should succeed when mimir values does not contain minio-tenant config
  set:
    addons:
      mimir:
        enabled: true
        values: {}
      minioOperator:
        enabled: false
  template: mimir/helmrelease.yaml
  asserts:
  - isKind:
      of: HelmRelease

- it: should render kafka ingest storage structuredConfig when kafkaIngestStorage is enabled
  set:
    addons:
      mimir:
        enabled: true
        kafkaIngestStorage:
          enabled: true
          brokerHost: "b-1.cluster.kafka.us-east-1.amazonaws.com"
          brokerPort: 9092
          topic: "mimir-ingest"
      minioOperator:
        enabled: false
  template: mimir/values.yaml
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "ingest_storage"
  - matchRegex:
      path: stringData.defaults
      pattern: "b-1.cluster.kafka.us-east-1.amazonaws.com:9092"
  - matchRegex:
      path: stringData.defaults
      pattern: "push_grpc_method_enabled: false"

- it: should render kafka-broker outbound route when kafkaIngestStorage and istio are enabled
  set:
    istio:
      enabled: true
    addons:
      mimir:
        enabled: true
        kafkaIngestStorage:
          enabled: true
          brokerHost: "b-1.cluster.kafka.us-east-1.amazonaws.com"
          brokerPort: 9092
          topic: "mimir-ingest"
      minioOperator:
        enabled: false
  template: mimir/values.yaml
  asserts:
  - matchRegex:
      path: stringData.defaults
      pattern: "kafka-broker"

- it: should not render kafka config when kafkaIngestStorage is disabled
  set:
    addons:
      mimir:
        enabled: true
        kafkaIngestStorage:
          enabled: false
      minioOperator:
        enabled: false
  template: mimir/values.yaml
  asserts:
  - notMatchRegex:
      path: stringData.defaults
      pattern: "ingest_storage"
