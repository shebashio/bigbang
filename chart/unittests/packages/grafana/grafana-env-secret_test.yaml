# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Grafana - Env Secret
templates:
  - templates/grafana/grafana-env-secret.yaml
tests:
  - it: should create the Grafana env secret when GitLab Redis dashboards are enabled
    set:
      grafana:
        enabled: true
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: grafana-env-secret
      - equal:
          path: metadata.namespace
          value: monitoring
      - equal:
          path: stringData.GITLAB_REDIS_PASSWORD
          value: redis-pass

  - it: should create the Grafana env secret when GitLab Runner Redis dashboards are enabled
    set:
      grafana:
        enabled: true
      addons:
        gitlabRunner:
          enabled: true
        gitlab:
          redis:
            password: redis-pass
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.GITLAB_REDIS_PASSWORD
          value: redis-pass

  - it: should not create the Grafana env secret when neither GitLab nor GitLab Runner is enabled
    set:
      grafana:
        enabled: true
      addons:
        gitlab:
          enabled: false
          redis:
            password: redis-pass
        gitlabRunner:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create the Grafana env secret when Grafana is disabled
    set:
      grafana:
        enabled: false
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    asserts:
      - hasDocuments:
          count: 0
