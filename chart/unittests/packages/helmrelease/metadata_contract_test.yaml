# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Packages - HelmRelease - Metadata Contract
release:
  name: test
  namespace: bigbang
tests:
- it: alloy HelmRelease should include standard metadata labels
  template: alloy/helmrelease.yaml
  set:
    alloy:
      enabled: true
  asserts:
  - hasDocuments:
      count: 1
  - equal:
      path: metadata.name
      value: alloy
  - equal:
      path: metadata.labels["app.kubernetes.io/name"]
      value: alloy
  - exists:
      path: metadata.labels["app.kubernetes.io/managed-by"]
  - equal:
      path: metadata.labels["app.kubernetes.io/part-of"]
      value: bigbang

