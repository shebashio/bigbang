# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Gitlab - Values Tests
templates:
  - templates/gitlab/values.yaml
tests:
  - it: sets the registry host from addons.gitlab.hostnames.registry
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons.gitlab.enabled: true
      addons.gitlab.hostnames.gitlab: custom-gitlab
      addons.gitlab.hostnames.registry: custom-registry
      domain: example.com
    asserts:
      - equal:
          path: routes.inbound.gitlab.hosts[0]
          value: "custom-gitlab.example.com"
      - equal:
          path: routes.inbound.registry.hosts[0]
          value: "custom-registry.example.com"
      - equal:
          path: global.hosts.domain
          value: "example.com"
      - equal:
          path: global.hosts.gitlab.name
          value: "custom-gitlab.example.com"
      - equal:
          path: global.hosts.registry.name
          value: "custom-registry.example.com"

  - it: configures the Big Bang Redis secret with the shared auth values shape
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons.gitlab.enabled: true
      addons.gitlab.redis.password: test-password
    asserts:
      - equal:
          path: global.redis.auth.enabled
          value: true
      - equal:
          path: global.redis.auth.secret
          value: "gitlab-redis-secret-bb"
      - equal:
          path: global.redis.auth.key
          value: "secret"
      - notExists:
          path: global.redis.password

  - it: uses consolidated object storage without per-bucket connections by default
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons.gitlab.enabled: true
      addons.gitlab.objectStorage.type: minio
      addons.gitlab.objectStorage.endpoint: http://garage.garage.svc.cluster.local:3900
      addons.gitlab.objectStorage.region: garage
      addons.gitlab.objectStorage.accessKey: test-access-key
      addons.gitlab.objectStorage.accessSecret: test-secret-key
    asserts:
      - equal:
          path: global.appConfig.object_store.enabled
          value: true
      - equal:
          path: global.appConfig.object_store.connection.secret
          value: gitlab-object-storage
      - equal:
          path: global.appConfig.object_store.connection.key
          value: rails
      - notExists:
          path: global.appConfig.lfs.connection
      - notExists:
          path: global.appConfig.artifacts.connection
      - notExists:
          path: global.appConfig.uploads.connection
      - notExists:
          path: global.appConfig.packages.connection
      - notExists:
          path: global.appConfig.dependencyProxy.connection

  - it: preserves an explicit per-bucket object storage configuration
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons.gitlab.enabled: true
      addons.gitlab.objectStorage.type: s3
      addons.gitlab.objectStorage.endpoint: https://s3.us-gov-west-1.amazonaws.com
      addons.gitlab.objectStorage.region: us-gov-west-1
      addons.gitlab.objectStorage.accessKey: test-access-key
      addons.gitlab.objectStorage.accessSecret: test-secret-key
      addons.gitlab.values.global.appConfig.object_store.enabled: false
    asserts:
      - notExists:
          path: global.appConfig.object_store
      - equal:
          path: global.appConfig.lfs.connection.secret
          value: gitlab-object-storage
      - equal:
          path: global.appConfig.artifacts.connection.key
          value: rails

  - it: preserves GitLab 18 network policy defaults when removed service blocks are absent
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons.gitlab.enabled: true
    asserts:
      - equal:
          path: networkPolicies.egress.from.migrations.to.definition.storage-subnets
          value: false
      - equal:
          path: networkPolicies.egress.from.migrations.to.definition.database-subnets
          value: false
      - notExists:
          path: redis-bb
      - notExists:
          path: garage
      - notExists:
          path: postgresql.enabled

  - it: tolerates null GitLab 19 removed service blocks without enabling replacements
    postRenderer:
      cmd: "sh"
      args:
        - "-c"
        - "yq eval '.stringData.defaults' - | yq eval '.'"
    set:
      addons:
        gitlab:
          enabled: true
          values:
            global:
              minio: null
            upstream:
              postgresql: null
              redis: null
              minio: null
    asserts:
      - equal:
          path: networkPolicies.egress.from.migrations.to.definition.storage-subnets
          value: true
      - equal:
          path: networkPolicies.egress.from.migrations.to.definition.database-subnets
          value: true
      - notExists:
          path: redis-bb
      - notExists:
          path: garage
      - notExists:
          path: postgresql.enabled
