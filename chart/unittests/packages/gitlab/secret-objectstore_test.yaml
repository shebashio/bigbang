# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Package - Gitlab - Object Storage Secret Tests
templates:
  - templates/gitlab/secret-objectstore.yaml
tests:
  - it: configures an HTTPS S3 registry endpoint for SigV4
    set:
      addons.gitlab.enabled: true
      addons.gitlab.objectStorage.type: s3
      addons.gitlab.objectStorage.endpoint: https://s3.example.com
      addons.gitlab.objectStorage.region: us-east-1
      addons.gitlab.objectStorage.accessKey: test-access-key
      addons.gitlab.objectStorage.accessSecret: test-secret-key
    asserts:
      - isKind:
          of: Secret
      - matchRegex:
          path: stringData.registry
          pattern: 'regionendpoint: "https://s3.example.com"'
      - matchRegex:
          path: stringData.registry
          pattern: "secure: true"
      - matchRegex:
          path: stringData.registry
          pattern: "v4auth: true"
      - notMatchRegex:
          path: stringData.registry
          pattern: "aws_signature_version"

  - it: configures an HTTP MinIO-compatible registry endpoint for SigV4 and path-style access
    set:
      addons.gitlab.enabled: true
      addons.gitlab.objectStorage.type: minio
      addons.gitlab.objectStorage.endpoint: http://garage.garage.svc.cluster.local:3900
      addons.gitlab.objectStorage.region: garage
      addons.gitlab.objectStorage.accessKey: test-access-key
      addons.gitlab.objectStorage.accessSecret: test-secret-key
    asserts:
      - matchRegex:
          path: stringData.registry
          pattern: 'regionendpoint: "http://garage.garage.svc.cluster.local:3900"'
      - matchRegex:
          path: stringData.registry
          pattern: "secure: false"
      - matchRegex:
          path: stringData.registry
          pattern: "v4auth: true"
      - matchRegex:
          path: stringData.registry
          pattern: "pathstyle: true"
      - notMatchRegex:
          path: stringData.registry
          pattern: "aws_signature_version"
      - notMatchRegex:
          path: stringData.registry
          pattern: "path_style"
