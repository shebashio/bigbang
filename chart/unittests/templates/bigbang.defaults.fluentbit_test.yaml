# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Template - bigbang.defaults.fluentbit
templates:
- templates/_self-test/render.yaml
- templates/fluentbit/values.yaml
tests:
- it: must source storage-subnets from global definitions and enable when S3 output is configured
  set:
    networkPolicies:
      egress:
        definitions:
          storage-subnets:
            to:
              - ipBlock:
                  cidr: 10.99.0.0/16
            ports:
              - port: 443
                protocol: TCP
    fluentbit:
      values:
        additionalOutputs:
          s3:
            bucket: test-bucket
            region: us-gov-west-1
            aws_access_key_id: test
            aws_secret_access_key: test
    _selfTest:
      bigbang.defaults.fluentbit:
        resultIsYaml: true
        args: helm:context
  template: templates/_self-test/render.yaml
  asserts:
  - equal:
      path: result.networkPolicies.egress.definitions["storage-subnets"]
      value:
        to:
          - ipBlock:
              cidr: 10.99.0.0/16
        ports:
          - port: 443
            protocol: TCP
  - equal:
      path: result.networkPolicies.egress.from["fluent-bit"].to.definition["storage-subnets"].enabled
      value: true

- it: must generate collector-native pipeline outputs and secret-backed env for default elasticsearch and loki
  set:
    fluentbit:
      values: {}
    elasticsearchKibana:
      enabled: true
    loki:
      enabled: true
    _selfTest:
      bigbang.defaults.fluentbit:
        resultIsYaml: true
        args: helm:context
  template: templates/_self-test/render.yaml
  asserts:
  - equal:
      path: result.upstream.config.pipeline.filters[0].name
      value: kubernetes
  - equal:
      path: result.upstream.config.pipeline.outputs[0].name
      value: es
  - equal:
      path: result.upstream.config.pipeline.outputs[0].match
      value: kube.*
  - equal:
      path: result.upstream.config.pipeline.outputs[2].name
      value: loki
  - equal:
      path: result.upstream.env[0].name
      value: FLUENT_ELASTICSEARCH_PASSWORD

- it: must keep opt-in additional outputs when disableDefault is true
  set:
    fluentbit:
      values:
        additionalOutputs:
          disableDefault: true
          loki:
            host: loki.example
            port: 3100
            user: loki-user
            password: loki-pass
    _selfTest:
      bigbang.defaults.fluentbit:
        resultIsYaml: true
        args: helm:context
  template: templates/_self-test/render.yaml
  asserts:
  - equal:
      path: result.upstream.config.pipeline.outputs[0].host
      value: ${EXTERNAL_LOKI_HOST}
  - equal:
      path: result.upstream.config.pipeline.outputs[0].match
      value: kube.*
  - equal:
      path: result.upstream.env[0].name
      value: EXTERNAL_LOKI_HOST
  - equal:
      path: result.upstream.env[2].name
      value: EXTERNAL_LOKI_USER
