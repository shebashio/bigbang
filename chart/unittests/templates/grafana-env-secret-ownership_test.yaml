# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Templates - Grafana Env Secret Ownership
tests:
  - it: should render the standalone Grafana env secret when standalone Grafana owns Grafana deployment
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: true
      grafana:
        enabled: true
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: grafana/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.GITLAB_REDIS_PASSWORD
          value: redis-pass

  - it: should not render the legacy Monitoring env secret when standalone Grafana owns Grafana deployment
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: true
      grafana:
        enabled: true
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: monitoring/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render the legacy Monitoring env secret when legacy Monitoring owns Grafana deployment
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: true
      grafana:
        enabled: false
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: monitoring/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: stringData.GITLAB_REDIS_PASSWORD
          value: redis-pass

  - it: should not render the standalone Grafana env secret when legacy Monitoring owns Grafana deployment
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: true
      grafana:
        enabled: false
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: grafana/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render the legacy Monitoring env secret when neither standalone nor legacy Monitoring Grafana is enabled
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: false
      grafana:
        enabled: false
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: monitoring/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render the standalone Grafana env secret when neither standalone nor legacy Monitoring Grafana is enabled
    set:
      monitoring:
        enabled: true
        values:
          upstream:
            grafana:
              enabled: false
      grafana:
        enabled: false
      addons:
        gitlab:
          enabled: true
          redis:
            password: redis-pass
    template: grafana/grafana-env-secret.yaml
    asserts:
      - hasDocuments:
          count: 0
