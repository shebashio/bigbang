# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: Schema - Unified Built-in Package Paths
templates:
  - templates/kiali/helmrelease.yaml
  - templates/kiali/values.yaml
  - templates/gitlab/helmrelease.yaml
  - templates/gitlab/values.yaml
  - templates/package/helmrelease.yaml
release:
  name: test
tests:
  - it: should disable a top-level built-in package through packages
    set:
      packages:
        kiali:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/kiali/helmrelease.yaml

  - it: should enable an add-on through packages and apply Flux overrides
    set:
      packages:
        gitlab:
          enabled: true
          flux:
            timeout: 22m
    asserts:
      - equal:
          path: metadata.name
          value: gitlab
        template: templates/gitlab/helmrelease.yaml
      - equal:
          path: spec.timeout
          value: 22m
        template: templates/gitlab/helmrelease.yaml

  - it: should prefer the unified package path over the legacy path
    set:
      kiali:
        enabled: true
      packages:
        kiali:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/kiali/helmrelease.yaml

  - it: should continue rendering unknown entries as custom packages
    set:
      packages:
        podinfo:
          enabled: true
          sourceType: git
          git:
            repo: https://github.com/stefanprodan/podinfo.git
            path: charts/podinfo
            tag: "6.3.4"
    asserts:
      - equal:
          path: metadata.name
          value: podinfo
        template: templates/package/helmrelease.yaml

  - it: should not render a built-in alias as a custom package
    set:
      packages:
        gitlab:
          enabled: true
    asserts:
      - hasDocuments:
          count: 0
        template: templates/package/helmrelease.yaml
