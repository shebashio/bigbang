celPoliciesBeta:
  excludeNamespaces:
    - kube-system

  # ---- MutatingPolicies ----
  add-default-capability-drop-cel:
    enabled: true

  add-default-securitycontext-cel:
    enabled: true

  update-automountserviceaccounttokens-default-cel:
    enabled: true
    namespaces:
      - istio-system
      - twistlock
      - argocd
      - logging
      - velero
      - minio
      - minio-operator
      - kyverno-reporter
      - kyverno
      - neuvector
      - kiali
      - harbor
      - authservice
      - anchore
      - fortify
      - vault
      - fluentbit
      - eck-operator
      - thanos
      - mattermost
      - mattermost-operator
      - bigbang
      - flux-system
      - keycloak
      - monitoring
      - gitlab
      - gitlab-runner
      - headlamp

  update-automountserviceaccounttokens-cel:
    enabled: true
    # Pinned to the kinds the legacy ClusterPolicy covered.
    autogenControllers: "Deployment,StatefulSet"
    namespaces:
      - namespace: istio-system
        serviceAccounts: ['.*']
        pods:
          allow:
            - istiod-.*
            - passthrough-ingressgateway-.*
            - public-ingressgateway-.*
      - namespace: twistlock
        serviceAccounts: ['.*']
        pods:
          allow:
            # For twistlock the gluon wait-job needs to query namespaces and check defenders are up
            - twistlock-twistlock-wait-job-.*
            # twistlock-init pods require get/list/patch/etc to several resources.
            # More details in twistlock/chart/templates/init/clusterrole.yaml
            - twistlock-init-.*
            # twistlock-volume-upgrade-job requires patch/get/list/update to deployments and get/list to pods
            # More details in twistlock/chart/templates/init/volume-upgrade-role.yaml
            - twistlock-volume-upgrade-job
            # Twistlock Defender enforces various policies that may involve the K8s cluster itself
            # Enforcing said policies requires access to the API to get/list resources
            - twistlock-defender-ds-.*
            # bb-twistlock-upgrade-job requires patch/get/list/update/etc to deployments daemonsets pv's and pvc
            # More details in twistlock/chart/templates/bigbang/upgrade-job.yaml
            - bb-twistlock-twistlock-upgrade-job-.*
            # For the gluon script test job to access the K8s API
            - twistlock-twistlock-script-test
      - namespace: logging
        serviceAccounts: ['.*']
        pods:
          allow:
            - logging-loki-minio-.*
            - logging-ek-wait-job-.*
            - logging-loki-script-test
          deny:
            - logging-ek-es-data.*
            - logging-ek-es-master.*
            - logging-ek-kb.*
            - logging-ek-metrics.*
      - namespace: fluentbit
        serviceAccounts: ['.*']
        pods:
          allow:
            - fluentbit-script-test
      - namespace: minio-operator
        serviceAccounts: ['.*']
        pods:
          allow:
            # console pods require access to several API resources
            # More details in minio-operator/chart/templates/console-clusterrole.yaml
            - console-.*
            # operator pods require access to several API resources
            # More details in minio-operator/chart/templates/operator-clusterrole.yaml
            - minio-operator-.*
            # tenantPatchJob requires get/list/patch on tenants (minio CRD)
            # More details in minio-operator/chart/templates/bigbang/tenant-patch-job.yaml
            - bb-minio-operator-minio-operator-tenant-patch
      - namespace: minio
        serviceAccounts: ['.*']
        pods:
          allow:
            # tenant pods require get/list/watch on secrets/tenants (CRD), and create/delete/get on services
            # More details in role named minio-minio-minio-instance-role
            - minio-minio-minio-instance-.*
            - minio-minio-wait-job-.*
            - minio-minio-script-test
      - namespace: kyverno
        serviceAccounts: ['.*']
        pods:
          allow:
            - kyverno-reports-controller-.*
            - kyverno-admission-controller-.*
            - kyverno-cleanup-controller-.*
            - kyverno-cleanup-admission-reports-.*
            - kyverno-admission-controller-.*
            - kyverno-background-controller-.*
            - kyverno-admission-controller-.*
            - kyverno-cleanup-cluster-admission-reports-.*
            - kyverno-cleanup-cluster-ephemeral-reports-.*
            - kyverno-cleanup-update-requests-.*
            - kyverno-clean-reports-.*
      - namespace: velero
        serviceAccounts: ['.*']
        pods:
          allow:
            - velero-cleanup-crds-.*
            - velero-velero-.*
            - node-agent-.*
            - velero-label-namespace-.*
            - velero-backup-restore-test
      - namespace: neuvector
        serviceAccounts: ['.*']
        pods:
          allow:
            - neuvector-manager-pod-.*
            - neuvector-scanner-pod-.*
            - neuvector-cert-upgrader-job-.*
            - neuvector-controller-pod-.*
            - neuvector-enforcer-pod-.*
            - neuvector-updater-pod-.*
            - neuvector-prometheus-exporter-pod-.*
            - neuvector-registry-adapter-pod-.*
      - namespace: kiali
        serviceAccounts: ['.*']
        pods:
          allow:
            - kiali-.*
      - namespace: argocd
        serviceAccounts: ['.*']
        pods:
          allow:
            # application-controller pods interact with secrets, configmaps, events, and Argo CRDs
            # More details in argocd/chart/templates/argocd-application-controller/role.yaml
            - argocd-argocd-application-controller-.*
            # dex pods interact with secrets and configmaps
            # More details in argocd/chart/templates/dex/role.yaml
            - argocd-argocd-dex-server-.*
            # argocd-upgrade-job interacts with CRDs
            # More details in argocd/chart/templates/bigbang/upgrade-job.yaml
            - argocd-upgrade-job-.*
            # argocd server pods interact with secrets, configmaps, events, and CRDs
            # More details in argocd/chart/templates/argocd-server/role.yaml
            - argocd-argocd-server-.*
            # repo server pods require access to the K8s API if using RBAC
            # Ref: https://github.com/argoproj/argo-cd/blob/master/docs/operator-manual/rbac.md
            - argocd-argocd-repo-server-.*
            # The applicationSet controller pods interact with many API resources, including CRDs
            # More details in argocd/chart/templates/argocd-applicationset/role.yaml
            - argocd-argocd-applicationset-controller-.*
            # notifications controller pods interact with secrets, configmaps, and CRDs
            # More details in argocd/chart/templates/argocd-notifications/role.yaml
            # Additionally (this wildcard covers both)-
            # notifications bot pods interact with secrets, configmaps, and CRDs
            # More details in argocd/chart/templates/argocd-notifications/bots/slack/role.yaml
            - argocd-argocd-notifications-controller-.*
            # needed to allow gluon 0.9.0 to execute test.sh script
            - argocd-argocd-script-test
      - namespace: harbor
        serviceAccounts: ['.*']
        pods:
          allow:
            - harbor-script-test
        # Omitting the serviceAccount and Pods section forces the policy to apply to
        # all of the serviceAccount and Pods in the namespace
      - namespace: authservice
        serviceAccounts: ['.*']
        pods:
          allow:
            - authservice-authservice-redis-bb-.*
            - authservice-haproxy-sso-.*
      - namespace: monitoring
        serviceAccounts: ['.*']
        pods:
          allow:
            - monitoring-grafana.*
            - monitoring-monitoring-kube-admission-patch.*
            - monitoring-monitoring-kube-admission-create.*
            - monitoring-monitoring-kube-state-metrics.*
            - monitoring-operator.*
            - prometheus-monitoring-prometheus.*
      - namespace: alloy
        serviceAccounts: ['.*']
        pods:
          allow:
            - alloy-.*
      - namespace: mimir
        serviceAccounts: ['.*']
        pods:
          allow:
            - mimir-mimir-rollout-operator-.*
            - mimir-mimir-minio.*
            - mimir-mimir-script-test.*
      - namespace: anchore
        serviceAccounts: ['.*']
        pods:
          allow:
            - anchore-ui-redis-.*
            - redis-clean-upgrade-.*
      - namespace: fortify
        serviceAccounts: ['.*']
        # Omitting the serviceAccount and pods section forces the policy to apply to
        # all of the serviceAccounts and pods in the namespace
      - namespace: vault
        serviceAccounts: ['.*']
        pods:
          allow:
            - vault-vault-.*
            - vault-vault-agent-injector-.*
            - vault-vault-job-init-.*
      - namespace: fluentbit
        serviceAccounts: ['.*']
        pods:
          allow:
            - fluentbit-fluent-bit-.*
      - namespace: eck-operator
        serviceAccounts: ['.*']
        pods:
          allow:
            - elastic-operator-.*
      - namespace: thanos
        serviceAccounts: ['.*']
        pods:
          allow:
            - thanos-minio-.*
          deny:
            - thanos-query-frontend-.*
            - thanos-storegateway.*
            - thanos-query.*
      - namespace: mattermost
        serviceAccounts: ['.*']
        pods:
          allow:
            - default-minio-bucket-creation-.*
            - mattermost-minio-.*
            - mattermost-wait-job-.*
      - namespace: mattermost-operator
        serviceAccounts: ['.*']
        pods:
          allow:
            - mattermost-operator-.*
      - namespace: keycloak
        serviceAccounts: ['.*']
        pods:
          allow:
            - keycloak-.*
      - namespace: gitlab
        serviceAccounts: ['.*']
        pods:
          allow:
            - gitlab-shared-secrets.*
            - gitlab-script-test
      - namespace: gitlab-runner
        serviceAccounts: ['.*']
        pods:
          allow:
            - gitlab-runner-.*
      - namespace: headlamp
        serviceAccounts: ['.*']
        pods:
          allow:
            - headlamp-.*

  # ---- ValidatingPolicies ----
  block-ephemeral-containers-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-deprecated-apis-cel:
    enabled: true
    validationFailureAction: Audit

  disallow-host-namespaces-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-image-tags-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-namespaces-cel:
    enabled: true
    validationFailureAction: Enforce
    parameters:
      disallow:
        - bigbang
        - default

  disallow-nodeport-services-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-privilege-escalation-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-privileged-containers-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-selinux-options-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-auto-mount-service-account-token-cel:
    enabled: true
    validationFailureAction: Audit

  require-drop-all-capabilities-cel:
    enabled: true
    validationFailureAction: Enforce

  require-labels-cel:
    enabled: true
    validationFailureAction: Audit
    parameters:
      # require-labels-cel takes {key[, value]} regex entries (not bare strings).
      require:
        - key: app.kubernetes.io/name
        - key: app.kubernetes.io/version

  require-non-root-group-cel:
    enabled: true
    validationFailureAction: Enforce
    {{- if $istioEnabled }}
    # Istio's init container runs as root to program iptables.
    excludeContainers:
      - istio-init
    {{- end }}

  require-non-root-user-cel:
    enabled: true
    validationFailureAction: Enforce
    {{- if $istioEnabled }}
    # Istio's init container runs as root to program iptables.
    excludeContainers:
      - istio-init
    {{- end }}

  restrict-apparmor-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-capabilities-cel:
    enabled: true
    validationFailureAction: Enforce
    parameters:
      allow:
        - NET_BIND_SERVICE
      {{- if $istioEnabled }}
        # Istio sidecar init requires NET_ADMIN and NET_RAW to set up routing.
        # The sidecar is injected into most pods so this is allowed globally
        # rather than excepted per-workload.
        - NET_ADMIN
        - NET_RAW
      {{- end }}

  restrict-external-ips-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-external-names-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-host-path-mount-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-host-path-mount-pv-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-host-path-write-cel:
    enabled: true
    validationFailureAction: Enforce
    {{- if .Values.fluentbit.enabled }}
    parameters:
      allow:
        # Fluent Bit buffering/persistent state and node log tailing.
        - /var/log/flb-storage/
        - /var/log
    {{- end }}

  restrict-host-ports-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-image-registries-cel:
    enabled: true
    validationFailureAction: Enforce
    parameters:
      allow:
        - registry1.dso.mil
        - registry.dso.mil

  restrict-proc-mount-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-seccomp-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-selinux-type-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-sysctls-cel:
    enabled: true
    validationFailureAction: Enforce

  restrict-volume-types-cel:
    enabled: true
    validationFailureAction: Enforce

  disallow-istio-injection-bypass-cel:
    enabled: {{ $istioEnabled }}
    validationFailureAction: Audit
    # Istio does not inject itself.
    excludeNamespaces:
      - istio-system
      - istio-gateway

  require-istio-on-namespaces-cel:
    enabled: {{ $istioEnabled }}
    validationFailureAction: Audit
    # Control-plane / Flux / Big Bang namespaces do not use Istio.
    # (kube-system is excluded via the global celPoliciesBeta.excludeNamespaces.)
    excludeNamespaces:
      - kube-node-lease
      - kube-public
      - bigbang
      - default
      - flux-system
      - istio-system
      - istio-gateway

policies:
  add-default-capability-drop:
