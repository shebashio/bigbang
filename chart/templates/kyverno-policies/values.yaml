{{- $pkg := "kyvernoPolicies" }}

{{- if (get .Values $pkg).enabled }}
{{- include "values-secret" (dict "root" $ "package" (dict "values" (fromYaml (include "bigbang.overlays.kyverno-policies" .))) "name" "kyverno-policies" "defaults" (include "bigbang.defaults.kyverno-policies" .)) }}
{{- end }}

{{- define "bigbang.defaults.kyverno-policies" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $deployNodeAgent := (and .Values.addons.velero.enabled (dig "deployNodeAgent" false .Values.addons.velero.values)) }}

additionalPolicyExceptions:
  {{- include "bigbang.kyvernoPolicyExceptions.ztunnel" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.neuvector" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.twistlock" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.fluentbit" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.velero" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.gitlab" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.gitlabRunner" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.mimir" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.vault" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.monitoring" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.alloy" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.kiali" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.kyvernoReporter" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.thanos" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.externalSecrets" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.headlamp" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.backstage" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.gatekeeper" . | nindent 2 }}
  {{- include "bigbang.kyvernoPolicyExceptions.mattermost" . | nindent 2 }}
