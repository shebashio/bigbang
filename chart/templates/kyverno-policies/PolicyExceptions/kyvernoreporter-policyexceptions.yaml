{{- if and ((.Values.kyvernoreporter).enabled) ((.Values.kyverno).enabled) }}
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: kyvernoreporter
    name: kyvernoreporter-disallow-auto-mount-service-account-token-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: disallow-auto-mount-service-account-token
      ruleNames:
      - disallow-auto-mount-service-account-token
    match:
      any:
      - resources:
          kinds:
          - Pod
          - Deployment
          names:
          - kyverno-reporter*
          namespaces:
          - kyverno-reporter
{{- end }}