{{- if .Values.fluentbit.enabled }}
{{- $fluentbitPackage := deepCopy .Values.fluentbit -}}
{{- if .Values.fluentbit.values -}}
{{- $cleanedValues := include "mergeLegacyIstioHardenedKeys" (dict "values" .Values.fluentbit.values) | fromYaml -}}
{{- $fluentbitPackage = set $fluentbitPackage "values" $cleanedValues -}}
{{- end -}}
{{- include "values-secret" (dict "root" $ "package" $fluentbitPackage "name" "fluentbit" "defaults" (include "bigbang.defaults.fluentbit" .)) }}
{{- end }}

{{- define "bigbang.defaults.fluentbit" -}}
{{- $domainName := .Values.domain }}
{{- $disableDefault := dig "additionalOutputs" "disableDefault" false .Values.fluentbit.values }}
{{- $clusterName := (default "logging-loki" .Values.loki.clusterName) }}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $istioInjection := and $istioEnabled (ne (include "ambientEnabled" .) "true") (eq (dig "istio" "injection" "enabled" .Values.fluentbit) "enabled") }}
{{- $istioHardenedEnabled := or (dig "istio" "hardened" "enabled" false .Values.fluentbit.values) (dig "hardened" "enabled" false .Values.istiod.values) }}
{{- $existingOutputs := dig "upstream" "config" "pipeline" "outputs" (list) .Values.fluentbit.values }}
{{- $existingFilters := dig "upstream" "config" "pipeline" "filters" (list) .Values.fluentbit.values }}
{{- $existingEnv := dig "upstream" "env" (list) .Values.fluentbit.values }}
{{- $existingExtraVolumes := dig "upstream" "extraVolumes" (list) .Values.fluentbit.values }}
{{- $existingExtraVolumeMounts := dig "upstream" "extraVolumeMounts" (list) .Values.fluentbit.values }}

{{- $additionalElasticsearch := and
  (dig "additionalOutputs" "elasticsearch" "host" false .Values.fluentbit.values)
  (dig "additionalOutputs" "elasticsearch" "port" false .Values.fluentbit.values)
  (dig "additionalOutputs" "elasticsearch" "user" false .Values.fluentbit.values)
  (dig "additionalOutputs" "elasticsearch" "password" false .Values.fluentbit.values)
}}
{{- $additionalFluentd := and
  (dig "additionalOutputs" "fluentd" "host" false .Values.fluentbit.values)
  (dig "additionalOutputs" "fluentd" "port" false .Values.fluentbit.values)
  (or
    (and
      (dig "additionalOutputs" "fluentd" "user" false .Values.fluentbit.values)
      (dig "additionalOutputs" "fluentd" "password" false .Values.fluentbit.values))
    (dig "additionalOutputs" "fluentd" "sharedKey" false .Values.fluentbit.values))
}}
{{- $additionalLoki := and
  (dig "additionalOutputs" "loki" "host" false .Values.fluentbit.values)
  (dig "additionalOutputs" "loki" "port" false .Values.fluentbit.values)
}}
{{- $additionalS3 := and
  (dig "additionalOutputs" "s3" "bucket" false .Values.fluentbit.values)
  (dig "additionalOutputs" "s3" "region" false .Values.fluentbit.values)
  (or
    (and
      (dig "additionalOutputs" "s3" "aws_secret_access_key" false .Values.fluentbit.values)
      (dig "additionalOutputs" "s3" "aws_access_key_id" false .Values.fluentbit.values))
    (dig "additionalOutputs" "s3" "existingSecret" false .Values.fluentbit.values))
}}
{{- $defaultElasticsearch := and (not $disableDefault) .Values.elasticsearchKibana.enabled }}
{{- $defaultLoki := and (not $disableDefault) .Values.loki.enabled }}
{{- $needsKubeFilters := or $defaultElasticsearch $defaultLoki $additionalElasticsearch $additionalLoki $additionalFluentd $additionalS3 (gt (len $existingOutputs) 0) }}

{{- $lokiServiceMap := dict
    "monolith" "logging-loki"
    "scalable" "logging-loki-write"
    "distributed" "logging-loki-distributor"
}}
{{- $lokiServiceName := index $lokiServiceMap .Values.loki.strategy }}
{{- $lokiWriteDestUrl := printf "%s.logging" $lokiServiceName }}
{{- $storageLimit := dig "storage" "total_limit_size" "10G" .Values.fluentbit.values }}

{{- $pipelineOutputs := $existingOutputs }}
{{- if $defaultElasticsearch }}
{{- $pipelineOutputs = append $pipelineOutputs (dict
  "name" "es"
  "match" "kube.*"
  "host" (printf "%s-es-http.logging" (dig "elasticsearch" "name" "logging-ek" .Values.fluentbit.values))
  "http_user" "elastic"
  "http_passwd" "${FLUENT_ELASTICSEARCH_PASSWORD}"
  "logstash_format" "On"
  "suppress_type_name" "On"
  "retry_limit" "False"
  "replace_dots" "On"
  "tls" (ternary "Off" "On" (and $istioEnabled (dig "istio" "elasticsearch" "enabled" false .Values.elasticsearchKibana.values)))
  "tls.verify" (ternary nil "On" (and $istioEnabled (dig "istio" "elasticsearch" "enabled" false .Values.elasticsearchKibana.values)))
  "tls.ca_file" (ternary nil "/etc/elasticsearch/certs/ca.crt" (and $istioEnabled (dig "istio" "elasticsearch" "enabled" false .Values.elasticsearchKibana.values)))
  "net.keepalive" "Off"
  "storage.total_limit_size" $storageLimit
) }}
{{- $pipelineOutputs = append $pipelineOutputs (dict
  "name" "es"
  "match" "host.*"
  "host" (printf "%s-es-http.logging" (dig "elasticsearch" "name" "logging-ek" .Values.fluentbit.values))
  "http_user" "elastic"
  "http_passwd" "${FLUENT_ELASTICSEARCH_PASSWORD}"
  "logstash_format" "On"
  "suppress_type_name" "On"
  "logstash_prefix" "node"
  "retry_limit" "False"
  "tls" "On"
  "tls.verify" "On"
  "tls.ca_file" "/etc/elasticsearch/certs/ca.crt"
  "net.keepalive" "Off"
  "storage.total_limit_size" $storageLimit
) }}
{{- end }}
{{- if $defaultLoki }}
{{- $pipelineOutputs = append $pipelineOutputs (dict
  "name" "loki"
  "match" "kube.*"
  "labels" "job=fluentbit, container=$kubernetes['container_name'], pod=$kubernetes['pod_name'], namespace=$kubernetes['namespace_name'], node_name=$kubernetes['host']"
  "host" $lokiWriteDestUrl
  "port" 3100
  "auto_kubernetes_labels" "on"
  "retry_limit" "False"
  "tls" "Off"
  "net.keepalive" "Off"
  "storage.total_limit_size" $storageLimit
) }}
{{- $pipelineOutputs = append $pipelineOutputs (dict
  "name" "loki"
  "match" "host.*"
  "labels" "job=fluentbit, container=$kubernetes['container_name'], pod=$kubernetes['pod_name'], namespace=$kubernetes['namespace_name'], node_name=$kubernetes['host']"
  "host" $lokiWriteDestUrl
  "port" 3100
  "auto_kubernetes_labels" "on"
  "retry_limit" "False"
  "tls" "Off"
  "net.keepalive" "Off"
  "storage.total_limit_size" $storageLimit
) }}
{{- end }}
{{- if $additionalElasticsearch }}
  {{- $additionalElasticsearchConfig := dig "additionalOutputs" "elasticsearch" "additionalConfig" (dict) .Values.fluentbit.values }}
  {{- $additionalElasticsearchPreset := list "name" "match" "host" "port" "http_user" "http_passwd" "tls" "tls.verify" "tls.ca_file" "retry_limit" "net.keepalive" "logstash_format" "logstash_prefix" "suppress_type_name" "replace_dots" "storage.total_limit_size" }}
  {{- range $key, $_ := $additionalElasticsearchConfig }}
    {{- if has $key $additionalElasticsearchPreset }}
      {{- fail (printf "Cannot specify config option `%s`, Big Bang has set a default, please use `upstream.config.pipeline.outputs` if you need to customize this value." $key) }}
    {{- end }}
  {{- end }}
  {{- range (dig "additionalOutputs" "elasticsearch" "match" (list "kube.*" "host.*") .Values.fluentbit.values) }}
    {{- $pipelineOutputs = append $pipelineOutputs (merge (dict
      "name" "es"
      "match" .
      "host" "${EXTERNAL_ES_HOST}"
      "port" "${EXTERNAL_ES_PORT}"
      "http_user" "${EXTERNAL_ES_USER}"
      "http_passwd" "${EXTERNAL_ES_PASSWORD}"
      "logstash_format" "On"
      "suppress_type_name" "On"
      "retry_limit" "False"
      "replace_dots" "On"
      "tls" (ternary "On" "Off" (dig "additionalOutputs" "elasticsearch" "tls" false $.Values.fluentbit.values))
      "tls.verify" (ternary "On" "Off" (and (dig "additionalOutputs" "elasticsearch" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "elasticsearch" "caCert" false $.Values.fluentbit.values)))
      "tls.ca_file" (ternary "/etc/external-es/certs/ca.crt" nil (and (dig "additionalOutputs" "elasticsearch" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "elasticsearch" "caCert" false $.Values.fluentbit.values)))
      "net.keepalive" "Off"
      "storage.total_limit_size" $storageLimit
    ) $additionalElasticsearchConfig) }}
  {{- end }}
{{- end }}
{{- if $additionalLoki }}
  {{- $additionalLokiConfig := dig "additionalOutputs" "loki" "additionalConfig" (dict) .Values.fluentbit.values }}
  {{- $additionalLokiPreset := list "name" "match" "host" "port" "http_user" "http_passwd" "tls" "tls.verify" "tls.ca_file" "retry_limit" "net.keepalive" "auto_kubernetes_labels" "storage.total_limit_size" "labels" }}
  {{- range $key, $_ := $additionalLokiConfig }}
    {{- if has $key $additionalLokiPreset }}
      {{- fail (printf "Cannot specify config option `%s`, Big Bang has set a default, please use `upstream.config.pipeline.outputs` if you need to customize this value." $key) }}
    {{- end }}
  {{- end }}
  {{- range (dig "additionalOutputs" "loki" "match" (list "kube.*" "host.*") .Values.fluentbit.values) }}
    {{- $baseLokiOutput := dict
      "name" "loki"
      "match" .
      "host" "${EXTERNAL_LOKI_HOST}"
      "port" "${EXTERNAL_LOKI_PORT}"
      "retry_limit" "False"
      "net.keepalive" "Off"
      "auto_kubernetes_labels" "on"
      "storage.total_limit_size" $storageLimit
      "tls" (ternary "On" "Off" (dig "additionalOutputs" "loki" "tls" false $.Values.fluentbit.values))
      "tls.verify" (ternary "On" "Off" (and (dig "additionalOutputs" "loki" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "loki" "caCert" false $.Values.fluentbit.values)))
      "tls.ca_file" (ternary "/etc/external-loki/certs/ca.crt" nil (and (dig "additionalOutputs" "loki" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "loki" "caCert" false $.Values.fluentbit.values)))
    }}
    {{- if and (dig "additionalOutputs" "loki" "user" false $.Values.fluentbit.values) (dig "additionalOutputs" "loki" "password" false $.Values.fluentbit.values) }}
      {{- $baseLokiOutput = merge $baseLokiOutput (dict "http_user" "${EXTERNAL_LOKI_USER}" "http_passwd" "${EXTERNAL_LOKI_PASSWORD}") }}
    {{- end }}
    {{- $pipelineOutputs = append $pipelineOutputs (merge $baseLokiOutput $additionalLokiConfig) }}
  {{- end }}
{{- end }}
{{- if $additionalFluentd }}
  {{- $additionalFluentdConfig := dig "additionalOutputs" "fluentd" "additionalConfig" (dict) .Values.fluentbit.values }}
  {{- $additionalFluentdPreset := list "name" "match" "host" "port" "username" "password" "shared_key" "retry_limit" "net.keepalive" "tls" "tls.verify" "tls.ca_file" "storage.total_limit_size" }}
  {{- range $key, $_ := $additionalFluentdConfig }}
    {{- if has $key $additionalFluentdPreset }}
      {{- fail (printf "Cannot specify config option `%s`, Big Bang has set a default, please use `upstream.config.pipeline.outputs` if you need to customize this value." $key) }}
    {{- end }}
  {{- end }}
  {{- range (dig "additionalOutputs" "fluentd" "match" (list "kube.*" "host.*") .Values.fluentbit.values) }}
    {{- $baseFluentdOutput := dict
      "name" "forward"
      "match" .
      "host" "${EXTERNAL_FLUENTD_HOST}"
      "port" "${EXTERNAL_FLUENTD_PORT}"
      "retry_limit" "False"
      "net.keepalive" "Off"
      "storage.total_limit_size" $storageLimit
      "tls" (ternary "On" "Off" (dig "additionalOutputs" "fluentd" "tls" false $.Values.fluentbit.values))
      "tls.verify" (ternary "On" "Off" (and (dig "additionalOutputs" "fluentd" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "fluentd" "caCert" false $.Values.fluentbit.values)))
      "tls.ca_file" (ternary "/etc/external-fluentd/certs/ca.crt" nil (and (dig "additionalOutputs" "fluentd" "tlsVerify" false $.Values.fluentbit.values) (dig "additionalOutputs" "fluentd" "caCert" false $.Values.fluentbit.values)))
    }}
    {{- if and (dig "additionalOutputs" "fluentd" "user" false $.Values.fluentbit.values) (dig "additionalOutputs" "fluentd" "password" false $.Values.fluentbit.values) }}
      {{- $baseFluentdOutput = merge $baseFluentdOutput (dict "username" "${EXTERNAL_FLUENTD_USER}" "password" "${EXTERNAL_FLUENTD_PASSWORD}") }}
    {{- else }}
      {{- $baseFluentdOutput = merge $baseFluentdOutput (dict "shared_key" "${EXTERNAL_FLUENTD_SHARED_KEY}") }}
    {{- end }}
    {{- $pipelineOutputs = append $pipelineOutputs (merge $baseFluentdOutput $additionalFluentdConfig) }}
  {{- end }}
{{- end }}
{{- if $additionalS3 }}
  {{- $additionalS3Config := dig "additionalOutputs" "s3" "additionalConfig" (dict) .Values.fluentbit.values }}
  {{- $additionalS3Preset := list "name" "match" "bucket" "region" "retry_limit" "net.keepalive" "storage.total_limit_size" }}
  {{- range $key, $_ := $additionalS3Config }}
    {{- if has $key $additionalS3Preset }}
      {{- fail (printf "Cannot specify config option `%s`, Big Bang has set a default, please use `upstream.config.pipeline.outputs` if you need to customize this value." $key) }}
    {{- end }}
  {{- end }}
  {{- range (dig "additionalOutputs" "s3" "match" (list "kube.*" "host.*") .Values.fluentbit.values) }}
    {{- $pipelineOutputs = append $pipelineOutputs (merge (dict
      "name" "s3"
      "match" .
      "bucket" (dig "additionalOutputs" "s3" "bucket" false $.Values.fluentbit.values)
      "region" (dig "additionalOutputs" "s3" "region" false $.Values.fluentbit.values)
      "retry_limit" "False"
      "net.keepalive" "Off"
      "storage.total_limit_size" $storageLimit
    ) $additionalS3Config) }}
  {{- end }}
{{- end }}

{{- $pipelineFilters := $existingFilters }}
{{- if $needsKubeFilters }}
{{- $pipelineFilters = append $pipelineFilters (dict
  "name" "kubernetes"
  "match" "kube.*"
  "kube_ca_file" "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  "kube_token_file" "/var/run/secrets/kubernetes.io/serviceaccount/token"
  "merge_log" "On"
  "merge_log_key" "log_processed"
  "k8s-logging.parser" "On"
  "k8s-logging.exclude" "Off"
  "buffer_size" "1M"
) }}
{{- $pipelineFilters = append $pipelineFilters (dict
  "alias" "lua.add"
  "name" "lua"
  "match" "kube.*"
  "script" "/fluent-bit/scripts/add_labels.lua"
  "call" "add_labels"
) }}
{{- if or $defaultLoki $additionalLoki }}
{{- $pipelineFilters = append $pipelineFilters (dict
  "name" "lua"
  "match" "kube.*"
  "script" "/fluent-bit/scripts/remove_labels.lua"
  "call" "remove_labels"
) }}
{{- end }}
{{- end }}

{{- $env := $existingEnv }}
{{- if $defaultElasticsearch }}
{{- $env = append $env (dict
  "name" "FLUENT_ELASTICSEARCH_PASSWORD"
  "valueFrom" (dict "secretKeyRef" (dict "name" "logging-ek-es-elastic-user" "key" "elastic"))
) }}
{{- end }}
{{- if $additionalElasticsearch }}
{{- $env = append $env (dict "name" "EXTERNAL_ES_HOST" "valueFrom" (dict "secretKeyRef" (dict "name" "external-es-config" "key" "EXTERNAL_ES_HOST"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_ES_PORT" "valueFrom" (dict "secretKeyRef" (dict "name" "external-es-config" "key" "EXTERNAL_ES_PORT"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_ES_USER" "valueFrom" (dict "secretKeyRef" (dict "name" "external-es-config" "key" "EXTERNAL_ES_USER"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_ES_PASSWORD" "valueFrom" (dict "secretKeyRef" (dict "name" "external-es-config" "key" "EXTERNAL_ES_PASSWORD"))) }}
{{- end }}
{{- if $additionalLoki }}
{{- $env = append $env (dict "name" "EXTERNAL_LOKI_HOST" "valueFrom" (dict "secretKeyRef" (dict "name" "external-loki-config" "key" "EXTERNAL_LOKI_HOST"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_LOKI_PORT" "valueFrom" (dict "secretKeyRef" (dict "name" "external-loki-config" "key" "EXTERNAL_LOKI_PORT"))) }}
  {{- if and (dig "additionalOutputs" "loki" "user" false .Values.fluentbit.values) (dig "additionalOutputs" "loki" "password" false .Values.fluentbit.values) }}
{{- $env = append $env (dict "name" "EXTERNAL_LOKI_USER" "valueFrom" (dict "secretKeyRef" (dict "name" "external-loki-config" "key" "EXTERNAL_LOKI_USER"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_LOKI_PASSWORD" "valueFrom" (dict "secretKeyRef" (dict "name" "external-loki-config" "key" "EXTERNAL_LOKI_PASSWORD"))) }}
  {{- end }}
{{- end }}
{{- if $additionalFluentd }}
{{- $env = append $env (dict "name" "EXTERNAL_FLUENTD_HOST" "valueFrom" (dict "secretKeyRef" (dict "name" "external-fluentd-config" "key" "EXTERNAL_FLUENTD_HOST"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_FLUENTD_PORT" "valueFrom" (dict "secretKeyRef" (dict "name" "external-fluentd-config" "key" "EXTERNAL_FLUENTD_PORT"))) }}
  {{- if and (dig "additionalOutputs" "fluentd" "user" false .Values.fluentbit.values) (dig "additionalOutputs" "fluentd" "password" false .Values.fluentbit.values) }}
{{- $env = append $env (dict "name" "EXTERNAL_FLUENTD_USER" "valueFrom" (dict "secretKeyRef" (dict "name" "external-fluentd-config" "key" "EXTERNAL_FLUENTD_USER"))) }}
{{- $env = append $env (dict "name" "EXTERNAL_FLUENTD_PASSWORD" "valueFrom" (dict "secretKeyRef" (dict "name" "external-fluentd-config" "key" "EXTERNAL_FLUENTD_PASSWORD"))) }}
  {{- else }}
{{- $env = append $env (dict "name" "EXTERNAL_FLUENTD_SHARED_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" "external-fluentd-config" "key" "EXTERNAL_FLUENTD_SHARED_KEY"))) }}
  {{- end }}
{{- end }}
{{- if $additionalS3 }}
  {{- $s3SecretName := ternary (dig "additionalOutputs" "s3" "existingSecret" false .Values.fluentbit.values) "external-s3-config" (dig "additionalOutputs" "s3" "existingSecret" false .Values.fluentbit.values) }}
{{- $env = append $env (dict "name" "AWS_ACCESS_KEY_ID" "valueFrom" (dict "secretKeyRef" (dict "name" $s3SecretName "key" "AWS_ACCESS_KEY_ID"))) }}
{{- $env = append $env (dict "name" "AWS_SECRET_ACCESS_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" $s3SecretName "key" "AWS_SECRET_ACCESS_KEY"))) }}
{{- end }}

{{- $extraVolumes := $existingExtraVolumes }}
{{- $extraVolumeMounts := $existingExtraVolumeMounts }}
{{- if $defaultElasticsearch }}
{{- $extraVolumes = append $extraVolumes (dict "name" "elasticsearch-certs" "secret" (dict "secretName" "logging-ek-es-http-certs-public")) }}
{{- $extraVolumeMounts = append $extraVolumeMounts (dict "name" "elasticsearch-certs" "mountPath" "/etc/elasticsearch/certs/") }}
{{- end }}
{{- if and (dig "additionalOutputs" "elasticsearch" "tlsVerify" false .Values.fluentbit.values) (dig "additionalOutputs" "elasticsearch" "caCert" false .Values.fluentbit.values) }}
{{- $extraVolumes = append $extraVolumes (dict "name" "external-es-ca-cert" "secret" (dict "secretName" "external-es-ca-cert")) }}
{{- $extraVolumeMounts = append $extraVolumeMounts (dict "name" "external-es-ca-cert" "mountPath" "/etc/external-es/certs/") }}
{{- end }}
{{- if and (dig "additionalOutputs" "fluentd" "tlsVerify" false .Values.fluentbit.values) (dig "additionalOutputs" "fluentd" "caCert" false .Values.fluentbit.values) }}
{{- $extraVolumes = append $extraVolumes (dict "name" "external-fluentd-ca-cert" "secret" (dict "secretName" "external-fluentd-ca-cert")) }}
{{- $extraVolumeMounts = append $extraVolumeMounts (dict "name" "external-fluentd-ca-cert" "mountPath" "/etc/external-fluentd/certs/") }}
{{- end }}
{{- if and (dig "additionalOutputs" "loki" "tlsVerify" false .Values.fluentbit.values) (dig "additionalOutputs" "loki" "caCert" false .Values.fluentbit.values) }}
{{- $extraVolumes = append $extraVolumes (dict "name" "external-loki-ca-cert" "secret" (dict "secretName" "external-loki-ca-cert")) }}
{{- $extraVolumeMounts = append $extraVolumeMounts (dict "name" "external-loki-ca-cert" "mountPath" "/etc/external-loki/certs/") }}
{{- end }}
{{- if $additionalS3 }}
{{- $extraVolumes = append $extraVolumes (dict "name" "fluentbit-temp" "emptyDir" (dict)) }}
{{- $extraVolumeMounts = append $extraVolumeMounts (dict "name" "fluentbit-temp" "mountPath" "/tmp/fluent-bit/") }}
{{- end }}

networkPolicies:
  enabled: {{ .Values.networkPolicies.enabled }}
  controlPlaneCidr: {{ .Values.networkPolicies.controlPlaneCidr }}
  vpcCidr: {{ .Values.networkPolicies.vpcCidr }}
  istioNamespaceSelector:
  {{ include "istioNamespaceSelector" . | nindent 4 }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  egress:
    definitions: {{ .Values.networkPolicies.egress.definitions | toYaml | nindent 6 }}
    from:
      fluent-bit:
        to:
          definition:
            external-elastic:
              enabled: false
            external-loki:
              enabled: false
            external-fluentd:
              enabled: false
            storage-subnets:
              enabled: {{ $additionalS3 }}
            kubeAPI:
              enabled: true
          k8s:
            logging/elasticsearch:9200:
              enabled: {{ .Values.elasticsearchKibana.enabled }}
              podSelector:
                matchLabels:
                  common.k8s.elastic.co/type: elasticsearch
            logging/logging-loki:3100:
              enabled: {{ .Values.loki.enabled }}
            tempo/tempo:9411:
              enabled: {{ .Values.tempo.enabled }}
  ingress:
    definitions: {{ .Values.networkPolicies.ingress.definitions | toYaml | nindent 6 }}
    to:
      "fluent-bit:2020":
        from:
          k8s:
            alloy-alloy-metrics@alloy/alloy-metrics: {{ dig "alloyMetrics" "enabled" false .Values.alloy }}
            monitoring-monitoring-kube-prometheus@monitoring/prometheus: {{ .Values.monitoring.enabled }}
istio:
  enabled: {{ $istioEnabled }}
  hardened:
    enabled: {{ $istioHardenedEnabled }}
  sidecar:
    enabled: {{ and $istioHardenedEnabled (ne (include "ambientEnabled" .) "true") }}
  ambient:
    enabled: {{ include "ambientEnabled" . }}
  authorizationPolicies:
    enabled: {{ $istioHardenedEnabled }}
    generateFromNetpol: true

routes:
  outbound:
    bb-tests:
      enabled: {{ dig "bbtests" "enabled" false .Values.fluentbit.values }}
      hosts:
      - 'repo1.dso.mil'
      - grafana.{{ $domainName }}

bbtests:
  enableImagePullSecrets: {{ ne .Values.registryCredentials nil }}

openshift: {{ .Values.openshift }}

upstream:
  {{- include "secretsImagePullSecretsWithName" . | nindent 2 }}

  image:
    pullPolicy: {{ .Values.imagePullPolicy }}

  openShift:
    enabled: {{ .Values.openshift }}

  {{- if eq (include "metricScrapingEnabled" .) "true" }}
  serviceMonitor:
    enabled: true
    namespace: monitoring
    additionalLabels:
      prometheus: monitoring-monitoring-kube-prometheus
    endpointConfig:
      interval: 10s
      scrapeTimeout: 10s
      {{- if $istioInjection }}
      scheme: https
      tlsConfig:
        caFile: /etc/prom-certs/root-cert.pem
        certFile: /etc/prom-certs/cert-chain.pem
        keyFile: /etc/prom-certs/key.pem
        insecureSkipVerify: true
      {{- end }}

  dashboards:
    enabled: true
    namespace: monitoring
    labelKey: grafana_dashboard
  {{- end }}

  {{- if $istioEnabled }}
  podAnnotations:
    {{ include "istioAnnotation" . | nindent 2 }}
  {{- end }}

  {{- if .Values.kiali.enabled }}
  podLabels:
    service.istio.io/canonical-name: fluentbit-fluent-bit
  {{- end }}

  {{- if .Values.openshift }}
  podSecurityContext:
    seLinuxOptions:
      type: "spc_t"
  {{- end }}

  luaScripts:
    add_labels.lua: |
      function add_labels(tag, timestamp, record)
        record["kubernetes"]["labels"]["cluster"] = "{{ $clusterName }}"
        return 1, timestamp, record
      end
    remove_labels.lua: |
      function remove_labels(tag, timestamp, record)

        local patterns = {
          "service.istio.-",
          "security.istio.-",
          "helm.-",
          "istio.-",
          "statefulset.kubernetes.io/pod%-name",
          "prometheus",
          "operator.prometheus.io/name",
          "app.kubernetes.io/managed%-by",
          "app.kubernetes.io/part%-of",
          "apps.kuberentes.io/version",
          "apps.kubernetes.io/pod%-index",
          "heritage",
          "release",
          "elasticsearch.k8s.elastic.co.node.-",
          "vault_active",
          "vault_initialized",
          "vault_perf_standby"
        }

        if record["kubernetes"] ~= nil then
          if record["kubernetes"]["labels"] ~= nil then

            for key, value in pairs(record["kubernetes"]["labels"]) do
              local remove_key = false
              local i = 1
              while not remove_key and i <= #patterns do
                if string.match(key, patterns[i]) then
                  remove_key = true
                end
                i = i + 1
              end

              if remove_key then
                record["kubernetes"]["labels"][key] = nil
              end
            end

          end
        end

        return 1, timestamp, record
      end

  {{- if $env }}
  env:
    {{- toYaml $env | nindent 4 }}
  {{- end }}
  {{- if $extraVolumes }}
  extraVolumes:
    {{- toYaml $extraVolumes | nindent 4 }}
  {{- end }}
  {{- if $extraVolumeMounts }}
  extraVolumeMounts:
    {{- toYaml $extraVolumeMounts | nindent 4 }}
  {{- end }}
  config:
    pipeline:
      filters:
        {{- toYaml $pipelineFilters | nindent 8 }}
      outputs:
        {{- toYaml $pipelineOutputs | nindent 8 }}

loki:
  enabled: {{ .Values.loki.enabled }}

elasticsearchKibana:
  enabled: {{ .Values.elasticsearchKibana.enabled }}
{{- end -}}
