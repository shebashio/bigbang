{{- if and ((.Values.alloy).enabled ((.Values.kyverno).enabled ) }}
---
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: alloy
    name: alloy-add-default-securitycontext-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: add-default-securitycontext
      ruleNames:
      - add-default-securitycontext
    match:
      any:
      - resources:
          names:
          - alloy-alloy-logs*
          namespaces:
          - alloy
---
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: alloy
    name: alloy-require-non-root-group-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: require-non-root-group
      ruleNames:
      - require-non-root-group
    match:
      any:
      - resources:
          names:
          - alloy-alloy-logs*
          namespaces:
          - alloy
---
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: alloy
    name: alloy-require-non-root-user-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: require-non-root-user
      ruleNames:
      - require-non-root-user
    match:
      any:
      - resources:
          names:
          - alloy-alloy-logs*
          namespaces:
          - alloy
---
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: alloy
    name: alloy-restrict-capabilities-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: restrict-capabilities
      ruleNames:
      - restrict-capabilities
    match:
      any:
      - resources:
          names:
          - alloy-alloy-metrics*
          - alloy-alloy-receiver*
          - alloy-alloy-logs*
          - alloy-alloy-singleton*
          namespaces:
          - alloy
---
  apiVersion: kyverno.io/v2
  kind: PolicyException
  metadata:
    labels:
      app: alloy
    name: alloy-restrict-host-path-mount-exception
    namespace: {{ .Release.Namespace }}
  spec:
    exceptions:
    - policyName: restrict-host-path-mount
      ruleNames:
      - restrict-host-path-mount
    match:
      any:
      - resources:
          names:
          - alloy-alloy-logs*
          namespaces:
          - alloy
---
  apiVersion: kyverno.io/v2
