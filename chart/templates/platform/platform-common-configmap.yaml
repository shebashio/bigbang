{{- $istioEnabled := eq (include "istioEnabled" .) "true" -}}
{{- $istioHardened := dig "hardened" "enabled" false .Values.istiod.values -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-platform-values
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
{{- .Values | toYaml | nindent 4 }}
  common.yaml: |
    domain: {{ .Values.domain }}
    istio:
      enabled: {{ $istioEnabled }}
      hardened:
        enabled: {{ $istioHardened }}
      sidecar:
        enabled: {{ $istioHardened }}
      authorizationPolicies:
        enabled: {{ $istioHardened }}
        generateFromNetpol: {{ $istioHardened }}
    monitoring:
      enabled: {{ .Values.monitoring.enabled }}
    networkPolicies:
{{- .Values.networkPolicies | toYaml | nindent 6 }}
    global:
{{- pick .Values "domain" | toYaml | nindent 6 }}
