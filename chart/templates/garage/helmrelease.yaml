{{- $fluxSettings := merge .Values.addons.garage.flux .Values.flux -}}
{{- if .Values.addons.garage.enabled }}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: "core"
    {{- include "commonLabels" . | nindent 4}}
  annotations:
    checksum/bigbang-values: {{ include (print $.Template.BasePath "/garage/values.yaml") . | sha256sum }}
spec:
  targetNamespace: garage
  {{- include "bigbang.helmRelease.chartSpec" (dict "name" "garage" "package" .Values.addons.garage "root" .) | nindent 2 }}

  {{- toYaml $fluxSettings | nindent 2 }}

  {{- if .Values.addons.garage.postRenderers }}
  postRenderers:
  {{ include "garage.postRenderers" . | nindent 2 }}
  {{- toYaml .Values.addons.garage.postRenderers | nindent 2 }}
  {{- else }}
  postRenderers:
  {{ include "garage.postRenderers" . | nindent 2 }}
  {{- end }}
  {{- include "bigbang.helmRelease.valuesFrom" (dict "name" "garage" "root" .) | nindent 2 }}

  {{- if or $istioEnabled .Values.kyvernoPolicies.enabled .Values.monitoring.enabled }}
  dependsOn:
  {{- if $istioEnabled }}
    - name: {{ include "istioHelmRelease" . }}
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- if .Values.kyvernoPolicies.enabled }}
    - name: kyverno-policies
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- if .Values.monitoring.enabled }}
    - name: monitoring
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- end }}
{{- end }}
