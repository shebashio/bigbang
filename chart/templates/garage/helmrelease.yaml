{{- $fluxSettingsGarage := merge .Values.addons.garage.flux .Values.flux -}}
{{- if .Values.addons.garage.enabled }}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}
{{- $installMetricsPostRenderer := and .Values.monitoring.enabled $istioEnabled }}
{{- $installServiceMonitorPostRenderer := and .Values.monitoring.enabled $istioEnabled (ne (include "ambientEnabled" .) "true") (eq (dig "istio" "mtls" "mode" "STRICT" .Values.addons.garage.values) "STRICT") }}
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: "application-utilities"
    {{- include "commonLabels" . | nindent 4}}
  annotations:
    checksum/bigbang-values: {{ include (print $.Template.BasePath "/garage/values.yaml") . | sha256sum }}
spec:
  targetNamespace: garage
  {{- include "bigbang.helmRelease.chartSpec" (dict "name" "garage" "package" .Values.addons.garage "root" . "emitReleaseName" true) | nindent 2 }}

  {{- toYaml $fluxSettingsGarage | nindent 2 }}

  {{- if or .Values.addons.garage.postRenderers $installMetricsPostRenderer $installServiceMonitorPostRenderer }}
  postRenderers:
  {{- if $installMetricsPostRenderer }}
  {{ include "garage.metricsServicePostRenderer" . | nindent 2 }}
  {{- end }}
  {{- if $installServiceMonitorPostRenderer }}
  {{ include "garage.serviceMonitorPostRenderer" . | nindent 2 }}
  {{- end }}
  {{- with .Values.addons.garage.postRenderers }}
  {{ toYaml . | nindent 2 }}
  {{- end }}
  {{- end }}
  {{- include "bigbang.helmRelease.valuesFrom" (dict "name" "garage" "root" .) | nindent 2 }}

  {{- if or $istioEnabled .Values.kyvernoPolicies.enabled .Values.monitoring.enabled }}
  dependsOn:
  {{- if $istioEnabled }}
    {{- include "istioHelmReleases" . | nindent 4 }}
  {{- end }}
  {{- if .Values.kyvernoPolicies.enabled }}
    - name: kyverno-policies
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- if .Values.monitoring.enabled }}
    - name: monitoring
      namespace: {{ .Release.Namespace }}
  {{- end }}
  {{- end }}
{{- end }}
