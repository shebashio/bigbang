{{- if .Values.addons.bbctl.enabled }}
{{- include "values-secret" (dict "root" $ "package" .Values.addons.bbctl "name" "bbctl" "defaults" (include "bigbang.defaults.bbctl" .)) }}
{{- end }}

{{- define "bigbang.defaults.bbctl" -}}

image:
  imagePullPolicy: {{ .Values.imagePullPolicy }}

bigbang:
  monitoring:
    enabled: {{ .Values.monitoring.enabled }}
  istio:
    enabled: {{ .Values.istio.enabled }}

registryCredentials:
  registry: {{ .Values.registryCredentials.registry }}
  username: {{ .Values.registryCredentials.username }}
  password: {{ .Values.registryCredentials.password }}

credentialsFile:
  credentials:
  - uri: {{ .Values.registryCredentials.registry }}
    username: {{ .Values.registryCredentials.username }}
    password: {{ .Values.registryCredentials.password }}
  - uri: "{{ .Values.addons.bbctl.repoCredentials.repo }}"
    username: "{{ .Values.addons.bbctl.repoCredentials.username }}"
    password: "{{ .Values.addons.bbctl.repoCredentials.password }}"

baseConfig:
  preflight-check:
    registryserver: "https://{{ .Values.registryCredentials.registry }}"
    registryusername: {{ .Values.registryCredentials.username }}
    registrypassword: {{ .Values.registryCredentials.password }}

{{- end -}}
