{{- if .Values.addons.externalSecrets.enabled }}
{{- include "values-secret" (dict "root" $ "package" .Values.addons.externalSecrets "name" "external-secrets" "defaults" (include "bigbang.defaults.external-secrets" .)) }}
{{- end }}

{{- define "bigbang.defaults.external-secrets" -}}
{{- $istioEnabled := eq (include "istioEnabled" .) "true" }}

upstream:
  image:
    pullPolicy: {{ .Values.imagePullPolicy }}
    
  {{- include "secretsImagePullSecretsWithName" . | nindent 2 }}

monitoring:
  enabled: {{ .Values.monitoring.enabled }}

istio:
  enabled: {{ $istioEnabled }}

  sidecar:
    enabled: {{ ne (include "ambientEnabled" .) "true" }}

  ambient:
    enabled: {{ include "ambientEnabled" . }}

  authorizationPolicies:
    enabled: {{ include "authorizationPoliciesEnabled" (list .Values.addons.externalSecrets.values .) }}
    generateFromNetpol: {{ include "authorizationPoliciesEnabled" (list .Values.addons.externalSecrets.values .) }}

networkPolicies:
  enabled: {{ include "networkPoliciesEnabled" . }}
  hbonePortInjection:
    enabled: {{ include "ambientEnabled" . }}
  ingress:
    definitions: {{ .Values.networkPolicies.ingress.definitions | toYaml | nindent 6}}
    to:
      external-secrets-webhook:10250:
        from:
          definition:
            kubeAPI: {{ dig "upstream" "webhook" "create" "false" .Values.addons.externalSecrets }}
  egress:
    definitions: {{ .Values.networkPolicies.egress.definitions | toYaml | nindent 6}}
    from:
      external-secrets:
        to:
          k8s:
            vault/vault:8200: {{ .Values.addons.vault.enabled }}
      external-secrets-webhook:
        to:
          definition:
            kubeAPI: {{ dig "upstream" "certController" "create" "false" .Values.addons.externalSecrets }}
      external-secrets-cert-controller:
        to:
          definition:
            kubeAPI: {{ dig "upstream" "webhook" "create" "false" .Values.addons.externalSecrets }}

{{- if $istioEnabled }}
annotations:
  {{ include "istioAnnotation" . }}
{{- end }}

openshift: {{ .Values.openshift }}
{{- end -}}
